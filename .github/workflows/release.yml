name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release PR or Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm turbo run build:lib --filter=@vuepkg/calendar

      - name: Create Release PR
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: packages/calendar
        run: |
          PUBLISHED=$(npm view @vuepkg/calendar version 2>/dev/null || echo "none")
          LOCAL=$(node -p "require('./package.json').version")
          echo "npm: $PUBLISHED / local: $LOCAL"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            npm publish --access public
          else
            echo "Already published at $LOCAL, skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
