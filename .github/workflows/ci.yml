name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build:lib

      - name: Install Playwright (chromium)
        run: pnpm --filter @vuepkg/calendar exec playwright install --with-deps chromium

      - name: Build calendar demo for E2E
        run: pnpm --filter @vuepkg/calendar run build

      - name: E2E
        run: pnpm --filter @vuepkg/calendar run test:e2e
