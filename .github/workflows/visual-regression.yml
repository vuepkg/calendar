name: Visual Regression

# 시각 회귀는 OS·Chromium 렌더링에 민감해 push마다 CI에 넣지 않는다.
# UI/CSS 변경 PR 전에 수동 실행하거나, 스냅샷 갱신 시 사용한다.
on:
  workflow_dispatch:

jobs:
  visual-regression:
    name: Playwright visual regression
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium)
        run: pnpm --filter @vuepkg/calendar exec playwright install --with-deps chromium

      - name: Build calendar demo for E2E
        run: pnpm --filter @vuepkg/calendar run build

      - name: Visual regression
        run: pnpm --filter @vuepkg/calendar run test:e2e:visual
